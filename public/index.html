<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#002c5f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Global Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        height: 100%;
        height: 100dvh;
        background: #f5f6f8;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
        font-family: 'Noto Sans KR', 'Inter', sans-serif;
      }
      body { display: flex; justify-content: center; }
      #root {
        width: 100%;
        max-width: 420px;
        height: 100%;
        height: 100dvh;
        box-sizing: border-box;
      }
      /* PWA 헤더: 상태바 높이만큼 padding 확보 */
      .pwa-header {
        padding-top: env(safe-area-inset-top, 20px) !important;
      }
      /* PWA 하단: 홈 인디케이터 높이만큼 padding 확보 */
      .pwa-bottom {
        padding-bottom: env(safe-area-inset-bottom, 0px) !important;
      }
      select option { font-family: 'Noto Sans KR', sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
